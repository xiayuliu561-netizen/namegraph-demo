<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>名物词网状知识图谱演示（可展开）</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: rgba(255,255,255,0.94);
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at center, rgba(59,130,246,.08) 0%, rgba(59,130,246,0) 20%),
        radial-gradient(circle at center, rgba(16,185,129,.05) 20%, rgba(16,185,129,0) 38%),
        linear-gradient(180deg,#f8fbff 0%, #f3f6fb 100%);
    }
    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 18px 16px 24px;
      overflow: auto;
      backdrop-filter: blur(10px);
    }
    .sidebar h1 {
      font-size: 22px;
      margin: 0 0 8px;
      line-height: 1.35;
    }
    .muted { color: var(--muted); font-size: 13px; line-height: 1.75; }
    .card {
      background: rgba(255,255,255,.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      margin-top: 14px;
      box-shadow: 0 6px 18px rgba(15,23,42,.05);
    }
    .search {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      margin-top: 10px;
      outline: none;
    }
    .search:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.12);
    }
    .btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 13px;
      cursor: pointer;
      background: #111827;
      color: #fff;
      font-size: 13px;
      transition: transform .12s ease, opacity .12s ease, box-shadow .12s ease;
      box-shadow: 0 4px 12px rgba(17,24,39,.12);
    }
    button:hover { transform: translateY(-1px); }
    button.secondary {
      background: #eef2ff;
      color: #3730a3;
      box-shadow: none;
    }
    button.ghost {
      background: #f8fafc;
      color: #334155;
      box-shadow: none;
      border: 1px solid #e2e8f0;
    }
    .stat {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .stat div {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    .stat strong {
      display: block;
      font-size: 22px;
      margin-top: 4px;
    }
    #network-wrap {
      position: relative;
      min-height: 100vh;
    }
    #network {
      width: 100%;
      height: 100vh;
      background:
        radial-gradient(circle at center, rgba(59,130,246,.05) 0, rgba(59,130,246,.05) 2px, transparent 2px),
        linear-gradient(180deg,#ffffff 0%, #f6faff 100%);
      background-size: 28px 28px, auto;
    }
    .overlay {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,.90);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 18px rgba(15,23,42,.05);
      max-width: 290px;
    }
    .detail-item { margin: 8px 0; font-size: 14px; line-height: 1.8; word-break: break-word; }
    .detail-item b { color: #111827; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.75; }
    .quick-list button { margin: 6px 6px 0 0; }
    .legend {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      font-size: 13px;
      color: #374151;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      flex: 0 0 auto;
      border: 1px solid rgba(17,24,39,.2);
    }
    .badge {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 22%, rgba(59,130,246,.10) 0%, rgba(59,130,246,0) 28%),
        radial-gradient(circle at 78% 16%, rgba(168,85,247,.08) 0%, rgba(168,85,247,0) 24%),
        radial-gradient(circle at 70% 78%, rgba(16,185,129,.08) 0%, rgba(16,185,129,0) 28%);
      animation: floatGlow 15s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes floatGlow {
      0% { transform: translate3d(0,0,0) scale(1); opacity: .88; }
      100% { transform: translate3d(0,-10px,0) scale(1.04); opacity: 1; }
    }
    .app, #network-wrap, .sidebar, .overlay { position: relative; z-index: 1; }
    .card {
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(15,23,42,.08);
      border-color: #dbeafe;
    }
    .overlay {
      background: linear-gradient(180deg, rgba(255,255,255,.93), rgba(255,255,255,.86));
    }

  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h1>名物词网状知识图谱演示</h1>

    <div class="card">
      <div><b>搜索节点</b></div>
      <input id="searchInput" class="search" placeholder="输入名称" />
      <div class="btns">
        <button onclick="searchNode()">搜索并定位</button>
        <button class="secondary" onclick="resetView()">重置视图</button>
      </div>
      <div class="hint">搜索后会自动展开该节点的上级路径，并定位到对应位置。</div>
    </div>

    <div class="card">
      <div><b>当前节点操作</b></div>
      <div class="btns">
        <button class="secondary" onclick="expandSelected()">展开当前节点</button>
        <button class="secondary" onclick="collapseSelected()">收起当前节点</button>
        <button class="ghost" onclick="expandAllLevel1()">展开一级类</button>
        <button class="ghost" onclick="collapseAllToTop()">全部收起</button>
      </div>
    </div>

    <div class="card">
      <div><b>节点详情</b></div>
      <div id="details" class="muted" style="margin-top:10px;">请点击图中的任意节点，或先搜索一个名称。</div>
    </div>

    <div style="display:none;">
      <span id="visibleNodeCount">0</span>
      <span id="visibleEdgeCount">0</span>
      <span id="viewModeBadge">默认：仅展开一级类</span>
    </div>
  </aside>

  <main id="network-wrap">
    <div id="network"></div>
    <div class="overlay">
      默认：中心总览 + 一级类<br>
      双击任意类目：展开 / 收起下级<br>
      自动避让：新旧节点会一起平滑重排
    </div>
  </main>
</div>

const nodeMap = new Map(rawNodes.map(n => [n.id, n]));
const parentMap = new Map();
const childrenMap = new Map(rawNodes.map(n => [n.id, []]));
const labelIndex = new Map();
const realEdges = rawEdges.filter(e => !e.isHub);
const hubEdges = rawEdges.filter(e => e.isHub);

for (const node of rawNodes) {
  const key = node.label.trim();
  if (!labelIndex.has(key)) labelIndex.set(key, []);
  labelIndex.get(key).push(node.id);
}

for (const edge of realEdges) {
  parentMap.set(edge.to, edge.from);
  if (!childrenMap.has(edge.from)) childrenMap.set(edge.from, []);
  childrenMap.get(edge.from).push(edge.to);
}
for (const edge of hubEdges) {
  if (!childrenMap.has(edge.from)) childrenMap.set(edge.from, []);
  childrenMap.get(edge.from).push(edge.to);
  if (!parentMap.has(edge.to)) parentMap.set(edge.to, edge.from);
}

const visibleNodes = new Set([0, ...rawNodes.filter(n => n.level === 1).map(n => n.id)]);
const expandedNodes = new Set();
let selectedNodeId = null;
let layoutAnimationFrame = null;

function cleanShortLabel(label) {
  return label.replace(/\s*[（(].*$/, '').trim();
}

function wrapLabel(text, maxChars = 5) {
  const pure = cleanShortLabel(text);
  if (pure.length <= maxChars) return pure;
  const parts = [];
  for (let i = 0; i < pure.length; i += maxChars) {
    parts.push(pure.slice(i, i + maxChars));
  }
  return parts.join('\n');
}

function clamp(num, min, max) {
  return Math.max(min, Math.min(max, num));
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function nodeHasChildren(nodeId) {
  return (childrenMap.get(nodeId) || []).length > 0;
}

function isExpanded(nodeId) {
  return expandedNodes.has(nodeId);
}

function buildNodeLabel(node) {
  const base = wrapLabel(node.label, node.level <= 1 ? 4 : node.level === 2 ? 5 : 6);
  if (!nodeHasChildren(node.id) || node.isHub) return base;
  return base + '\n' + (isExpanded(node.id) ? '－' : '＋');
}

function estimateNodeRadius(node) {
  const label = buildNodeLabel(node);
  const lines = label.split('\n');
  const longest = Math.max(...lines.map(line => line.length));
  const radiusBase = node.isHub ? 58 : node.level === 1 ? 34 : node.level === 2 ? 31 : node.level === 3 ? 28 : 26;
  const radius = radiusBase + longest * 4.6 + (lines.length - 1) * 6;
  return clamp(radius, node.isHub ? 58 : 26, node.isHub ? 82 : 60);
}

function getVisibleChildren(nodeId) {
  return (childrenMap.get(nodeId) || []).filter(id => visibleNodes.has(id));
}

function computeVisibleWeight(nodeId) {
  const children = getVisibleChildren(nodeId);
  if (!children.length) return 1;
  const childSum = children.reduce((sum, childId) => sum + computeVisibleWeight(childId), 0);
  return Math.max(1.2, childSum);
}

function getNodeStyle(n) {
  if (n.isHub) {
    return {
      shape: 'circle',
      size: estimateNodeRadius(n),
      label: wrapLabel(n.label, 4),
      color: { background: '#0f172a', border: '#111827', highlight: { background: '#111827', border: '#60a5fa' } },
      borderWidth: 2.8,
      font: { color: '#ffffff', size: 20, face: 'Microsoft YaHei, PingFang SC, sans-serif', multi: 'md', bold: true },
      shadow: { enabled: true, color: 'rgba(15,23,42,.28)', size: 18, x: 0, y: 8 },
      fixed: { x: true, y: true }
    };
  }

  let color;
  let fontSize;
  if (n.level === 1) {
    color = { background:'#dbeafe', border:'#3b82f6', highlight: { background:'#bfdbfe', border:'#2563eb' } }; fontSize = 17;
  } else if (n.level === 2) {
    color = { background:'#dcfce7', border:'#22c55e', highlight: { background:'#bbf7d0', border:'#16a34a' } }; fontSize = 15;
  } else if (n.level === 3) {
    color = { background:'#fef3c7', border:'#f59e0b', highlight: { background:'#fde68a', border:'#d97706' } }; fontSize = 14;
  } else {
    color = { background:'#f3e8ff', border:'#a855f7', highlight: { background:'#e9d5ff', border:'#9333ea' } }; fontSize = 13;
  }

  const expanded = isExpanded(n.id);
  return {
    shape: 'circle',
    size: estimateNodeRadius(n),
    label: buildNodeLabel(n),
    color,
    borderWidth: expanded ? 2.8 : 1.9,
    font: {
      size: fontSize,
      face: 'Microsoft YaHei, PingFang SC, sans-serif',
      color: '#111827',
      multi: 'md',
      vadjust: 0,
      bold: n.level <= 1 ? true : false
    },
    shadow: {
      enabled: true,
      color: expanded ? 'rgba(59,130,246,.18)' : 'rgba(59,130,246,.10)',
      size: expanded ? 14 : 8,
      x: 0,
      y: expanded ? 5 : 3
    },
    fixed: { x: true, y: true }
  };
}

const nodes = new vis.DataSet(rawNodes.map(n => ({
  ...n,
  ...getNodeStyle(n),
  x: n.isHub ? 0 : undefined,
  y: n.isHub ? 0 : undefined,
  hidden: !visibleNodes.has(n.id)
})));

const edges = new vis.DataSet(rawEdges.map((e, i) => {
  const base = {
    id: i + 1,
    from: e.from,
    to: e.to,
    smooth: { type: 'cubicBezier', roundness: e.isHub ? 0.42 : 0.18 },
    arrows: e.isHub ? '' : 'to',
    selectionWidth: 2,
    hoverWidth: 0.8,
    hidden: !(visibleNodes.has(e.from) && visibleNodes.has(e.to))
  };
  if (e.isHub) {
    return {
      ...base,
      dashes: [6, 6],
      width: 1.5,
      color: { color: 'rgba(59,130,246,0.28)', highlight: '#60a5fa' }
    };
  }
  return {
    ...base,
    width: 1.35,
    color: { color: 'rgba(148,163,184,0.74)', highlight: '#3b82f6' }
  };
}));

const container = document.getElementById('network');
const data = { nodes, edges };
const options = {
  layout: { improvedLayout: false },
  interaction: {
    hover: true,
    navigationButtons: true,
    keyboard: true,
    tooltipDelay: 100,
    zoomView: true,

function updateCounts() {
  const visibleNodeCount = rawNodes.filter(n => visibleNodes.has(n.id)).length;
  const visibleEdgeCount = rawEdges.filter(e => visibleNodes.has(e.from) && visibleNodes.has(e.to)).length;
  document.getElementById('visibleNodeCount').textContent = visibleNodeCount;
  document.getElementById('visibleEdgeCount').textContent = visibleEdgeCount;
}

function computeRingRadii() {
  const visibleByLevel = new Map();
  for (const node of rawNodes) {
    if (!visibleNodes.has(node.id)) continue;
    if (!visibleByLevel.has(node.level)) visibleByLevel.set(node.level, []);
    visibleByLevel.get(node.level).push(node);
  }

  const radii = { 0: 0 };
  let previousRadius = 0;
  let previousMaxNodeRadius = estimateNodeRadius(nodeMap.get(0));
  const maxLevel = Math.max(...Array.from(visibleByLevel.keys()));

  for (let level = 1; level <= maxLevel; level++) {
    const nodesAtLevel = visibleByLevel.get(level) || [];
    const maxNodeRadius = nodesAtLevel.length ? Math.max(...nodesAtLevel.map(estimateNodeRadius)) : 30;
    const circumferenceNeed = nodesAtLevel.reduce((sum, node) => sum + estimateNodeRadius(node) * 2 + 52, 0);
    const minByCount = circumferenceNeed / (2 * Math.PI);
    const minByDepth = previousRadius + previousMaxNodeRadius + maxNodeRadius + (level === 1 ? 96 : 84);
    const base = level === 1 ? 250 : 0;
    radii[level] = Math.max(base, minByCount, minByDepth);
    previousRadius = radii[level];
    previousMaxNodeRadius = maxNodeRadius;
  }
  return radii;
}

function computeTargetPositions() {
  const radii = computeRingRadii();
  const targets = { 0: { x: 0, y: 0, angle: -Math.PI / 2 } };

  function assign(nodeId, startAngle, endAngle) {
    const node = nodeMap.get(nodeId);
    const angle = (startAngle + endAngle) / 2;
    const radius = radii[node.level] || 0;
    const levelJitter = node.level > 1 ? Math.sin(angle * 2.4 + node.level) * Math.min(18, radius * 0.02) : 0;
    const finalRadius = radius + levelJitter;
    targets[nodeId] = {
      x: Math.cos(angle) * finalRadius,
      y: Math.sin(angle) * finalRadius,
      angle
    };

    const children = getVisibleChildren(nodeId);
    if (!children.length) return;

    const sectorSpan = endAngle - startAngle;
    const gapAngle = Math.min(0.08, sectorSpan / Math.max(children.length * 7, 1));
    const weightSum = children.reduce((sum, childId) => sum + computeVisibleWeight(childId), 0);
    const usableSpan = Math.max(sectorSpan - gapAngle * Math.max(children.length - 1, 0), sectorSpan * 0.82);
    let cursor = startAngle + (sectorSpan - usableSpan) / 2;

    for (const childId of children) {
      const ratio = computeVisibleWeight(childId) / weightSum;
      const childSpan = usableSpan * ratio;
      const childCenter = cursor + childSpan / 2;
      assign(childId, childCenter - childSpan / 2, childCenter + childSpan / 2);
      cursor += childSpan + gapAngle;
    }
  }

  const topIds = getVisibleChildren(0);
  if (!topIds.length) return targets;
  const topWeights = topIds.map(id => computeVisibleWeight(id));
  const totalWeight = topWeights.reduce((sum, value) => sum + value, 0);
  const fullStart = -Math.PI / 2;
  let cursor = fullStart;
  for (let i = 0; i < topIds.length; i++) {
    const span = Math.PI * 2 * (topWeights[i] / totalWeight);
    assign(topIds[i], cursor, cursor + span);
    cursor += span;
  }
  return targets;
}

function refreshAllVisibleState() {
  const nodeUpdates = rawNodes.map(n => ({
    id: n.id,
    ...getNodeStyle(n),
    hidden: !visibleNodes.has(n.id)
  }));
  nodes.update(nodeUpdates);

  const edgeUpdates = rawEdges.map((e, i) => ({
    id: i + 1,
    hidden: !(visibleNodes.has(e.from) && visibleNodes.has(e.to))
  }));
  edges.update(edgeUpdates);
  updateCounts();
}

function animateLayout({ focusId = null, fit = false } = {}) {
  const visibleIds = rawNodes.filter(n => visibleNodes.has(n.id)).map(n => n.id);
  if (!visibleIds.length) return;

  if (layoutAnimationFrame) cancelAnimationFrame(layoutAnimationFrame);

  const targets = computeTargetPositions();
  const currentPositions = network.getPositions(visibleIds);
  const startPositions = {};

  for (const id of visibleIds) {
    const current = currentPositions[id];
    if (current && Number.isFinite(current.x) && Number.isFinite(current.y)) {
      startPositions[id] = current;
    } else {
      const parentId = parentMap.get(id);
      const parentPos = parentId != null ? (currentPositions[parentId] || targets[parentId] || { x: 0, y: 0 }) : { x: 0, y: 0 };
      startPositions[id] = { x: parentPos.x, y: parentPos.y };
    }
  }

  const duration = 640;
  const startTime = performance.now();

  function frame(now) {
    const progress = Math.min(1, (now - startTime) / duration);
    const eased = easeInOutCubic(progress);
    const updates = [];

    for (const id of visibleIds) {
      const from = startPositions[id] || { x: 0, y: 0 };
      const to = targets[id] || { x: 0, y: 0 };
      updates.push({
        id,
        x: from.x + (to.x - from.x) * eased,
        y: from.y + (to.y - from.y) * eased,
        fixed: { x: true, y: true }
      });
    }
    nodes.update(updates);

    if (progress < 1) {
      layoutAnimationFrame = requestAnimationFrame(frame);
    } else {
      layoutAnimationFrame = null;
      if (focusId != null && visibleNodes.has(focusId)) {
        network.focus(focusId, {
          scale: focusId === 0 ? 0.92 : 1.04,
          animation: { duration: 360, easingFunction: 'easeInOutQuad' }
        });
      } else if (fit) {
        network.fit({ animation: { duration: 520, easingFunction: 'easeInOutQuad' } });
      }
    }
  }

  layoutAnimationFrame = requestAnimationFrame(frame);
}

function relayout({ focusId = null, fit = false } = {}) {
  refreshAllVisibleState();
  animateLayout({ focusId, fit });
}

function getDescendants(nodeId) {
  const result = [];
  const stack = [...(childrenMap.get(nodeId) || [])];
  while (stack.length) {
    const current = stack.pop();
    result.push(current);
    const children = childrenMap.get(current) || [];
    for (const child of children) stack.push(child);
  }
  return result;
}

function showDirectChildren(nodeId) {
  const children = childrenMap.get(nodeId) || [];
  for (const childId of children) {
    visibleNodes.add(childId);
  }
}

function expandNode(nodeId, withFocus = true) {
  if (!nodeHasChildren(nodeId)) return false;
  showDirectChildren(nodeId);
  expandedNodes.add(nodeId);
  relayout({ focusId: withFocus ? nodeId : null, fit: !withFocus });
  return true;
}

function collapseNode(nodeId, withFocus = true) {
  if (!nodeHasChildren(nodeId)) return false;
  const descendants = getDescendants(nodeId);
  for (const id of descendants) {
    visibleNodes.delete(id);
    expandedNodes.delete(id);
  }
  expandedNodes.delete(nodeId);
  relayout({ focusId: withFocus ? nodeId : null, fit: !withFocus });
  return true;
}

function toggleNode(nodeId) {
  if (!nodeHasChildren(nodeId)) return;
  if (expandedNodes.has(nodeId)) {
    collapseNode(nodeId, true);
  } else {
    expandNode(nodeId, true);
  }
}

function ensurePathVisible(nodeId) {
  const chain = [];
  let current = nodeId;
  while (parentMap.has(current)) {
    const parent = parentMap.get(current);
    chain.unshift(parent);
    current = parent;
  }
  for (const ancestor of chain) {
    if (ancestor !== 0) {
      showDirectChildren(ancestor);
      expandedNodes.add(ancestor);
    }
  }
  visibleNodes.add(nodeId);
  relayout({ focusId: null, fit: false });
}

function showDetails(nodeId) {
  const node = nodeMap.get(nodeId);
  if (!node) return;
  const childCount = (childrenMap.get(nodeId) || []).length;
  if (node.isHub) {
    document.getElementById('details').innerHTML = `
      <div class="detail-item"><b>名称：</b>名物词图谱</div>
      <div class="detail-item"><b>类型：</b>中心总览节点</div>
      <div class="detail-item"><b>说明：</b>该节点用于组织所有一级类，形成由中心向外发散的圆形结构，并支持自动避让重排。</div>
      <div class="detail-item"><b>当前状态：</b>始终显示</div>
    `;
    return;
  }
  document.getElementById('details').innerHTML = `
    <div class="detail-item"><b>名称：</b>${node.label}</div>
    <div class="detail-item"><b>层级：</b>${node.level}</div>
    <div class="detail-item"><b>上级路径：</b>${node.parent_path || '—'}</div>
    <div class="detail-item"><b>完整路径：</b>${node.path || '—'}</div>
    <div class="detail-item"><b>下级数量：</b>${childCount}</div>
    <div class="detail-item"><b>当前状态：</b>${childCount ? (expandedNodes.has(nodeId) ? '已展开（参与自动重排）' : '已收起') : '无下级节点'}</div>
  `;
}

network.on('click', function(params) {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    selectedNodeId = nodeId;
    showDetails(nodeId);
  }
});

network.on('doubleClick', function(params) {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    selectedNodeId = nodeId;
    showDetails(nodeId);
    toggleNode(nodeId);
  }
});

function findNodeIdsByName(name) {
  return labelIndex.get(name.trim()) || [];
}

function searchNode() {
  const name = document.getElementById('searchInput').value.trim();
  if (!name) return;
  const ids = findNodeIdsByName(name);
  if (!ids.length) {
    alert('没有找到该名称，请检查是否完全一致。');
    return;
  }
  const id = ids.sort((a, b) => (nodeMap.get(a).level - nodeMap.get(b).level))[0];
  ensurePathVisible(id);
  selectedNodeId = id;
  network.selectNodes([id]);
  network.focus(id, {
    scale: 1.16,
    animation: { duration: 720, easingFunction: 'easeInOutQuad' }
  });
  showDetails(id);
  document.getElementById('viewModeBadge').textContent = ids.length > 1 ? '提示：存在同名节点，已定位到层级更浅的一个' : '已自动展开搜索节点路径';
}

function quickFind(name) {
  document.getElementById('searchInput').value = name;
  searchNode();
}

function resetView() {
  network.unselectAll();
  relayout({ fit: true });
  document.getElementById('details').innerHTML = '请点击图中的任意节点，或先搜索一个名称。';
  document.getElementById('viewModeBadge').textContent = '默认：仅展开一级类';
}

function expandSelected() {
  if (selectedNodeId == null) {
    alert('请先单击一个节点。');
    return;
  }
  const ok = expandNode(selectedNodeId, true);
  if (!ok) alert('该节点没有下级，无法继续展开。');
  showDetails(selectedNodeId);
  document.getElementById('viewModeBadge').textContent = '已展开当前节点，并完成自动重排';
}

function collapseSelected() {
  if (selectedNodeId == null) {
    alert('请先单击一个节点。');
    return;
  }
  const ok = collapseNode(selectedNodeId, true);
  if (!ok) alert('该节点没有下级，无法收起。');
  showDetails(selectedNodeId);
  document.getElementById('viewModeBadge').textContent = '已收起当前节点，并重新整理布局';
}

function expandAllLevel1() {
  const topLevelIds = rawNodes.filter(n => n.level === 1).map(n => n.id);
  for (const id of topLevelIds) {
    showDirectChildren(id);
    expandedNodes.add(id);
  }
  relayout({ fit: true });
  document.getElementById('viewModeBadge').textContent = '已展开全部一级类，并自动避让';
}

function collapseAllToTop() {
  expandedNodes.clear();
  visibleNodes.clear();
  visibleNodes.add(0);
  for (const node of rawNodes) {
    if (node.level === 1) visibleNodes.add(node.id);
  }
  relayout({ fit: true });
  document.getElementById('viewModeBadge').textContent = '默认：仅展开一级类';
  if (selectedNodeId != null) showDetails(selectedNodeId);
}

window.searchNode = searchNode;
window.quickFind = quickFind;
window.resetView = resetView;
window.expandSelected = expandSelected;
window.collapseSelected = collapseSelected;
window.expandAllLevel1 = expandAllLevel1;
window.collapseAllToTop = collapseAllToTop;

refreshAllVisibleState();
setTimeout(() => {
  relayout({ fit: true });
}, 80);
</script>
</body>
</html>
